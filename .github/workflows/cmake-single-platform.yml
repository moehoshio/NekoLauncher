name: Build for Multiple Platforms

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
        arch: [x64, arm64]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    
    - name: Set up CMake
      uses: lukka/get-cmake@latest

    - name: Install dependencies
      run: |
        if [[ ${{ matrix.os }} == 'macos-latest' ]]; then
          brew install qt libcurl openssl
        fi

    - name: Configure CMake
      run: cmake . -Bbuild

    - name: Build
      run: cmake --build build --config Release
